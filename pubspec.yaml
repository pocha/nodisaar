name: nodisaar
description: Curate & share your OTT favourites
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.0
  firebase_auth: ^5.3.0
  flutter_inappwebview: ^6.1.5
  shared_preferences: ^2.3.0
  share_plus: ^12.0.1
  app_links: ^6.3.2
  intl: ^0.19.0
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/netflix-logo.png
    - assets/prime-logo.avif