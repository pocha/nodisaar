name: nodisaar
description: Curate & share your OTT favourites
publish_to: 'none'
version: 1.1.2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.0
  firebase_auth: ^5.3.0
  firebase_messaging: ^15.1.0
  flutter_inappwebview: ^6.1.5
  shared_preferences: ^2.3.0
  share_plus: ^12.0.1
  app_links: ^6.3.2
  intl: ^0.19.0
  http: ^1.6.0
  package_info_plus: ^9.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.2

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/nodisaar-icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0e0e11"
  adaptive_icon_foreground: "assets/icon/nodisaar-icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/netflix-logo.png
    - assets/icon/prime-logo.png
    - assets/icon/jiohotstar-logo.png
    - assets/icon/appletv-logo.png
    - assets/icon/max-logo.png
    - assets/icon/sonyliv-logo.png
    - assets/icon/zee5-logo.png
    - assets/icon/hulu-logo.png
    - assets/icon/crunchyroll-logo.png
    - assets/icon/paramount-logo.png
    - assets/icon/mxplayer-logo.png
    - assets/icon/youtube-logo.png
    - assets/icon/discovery-logo.png